<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 디지몬 마스터즈 도구 모음</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="DMOKit">
    <meta property="og:description" content="디지몬 마스터즈 온라인 도구 모음 - 탐험 효율 계산기, 가챠 시뮬레이터">
    <meta property="og:image" content="./dmo.png">
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <h2>DMOKit</h2>
            <p class="subtitle">디지몬 마스터즈 온라인 도구 모음</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="menu-grid">
            <a href="explore.html" class="menu-card">
                <div class="icon">🗺️</div>
                <div class="title">탐험 효율 계산기</div>
                <div class="desc">Lv.1 ~ Lv.170 탐험지별 효율 분석</div>
            </a>
            <a href="gacha.html" class="menu-card">
                <div class="icon">🎲</div>
                <div class="title">가챠 시뮬레이터</div>
                <div class="desc">데이터 소환 / 드로우 / 융합 시뮬레이션</div>
            </a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
