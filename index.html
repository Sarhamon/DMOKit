<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 디지몬 마스터즈 도구 모음</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="icon" type="image/png" href="img/dmo.png">
    <link rel="stylesheet" href="css/style.css">
    <meta property="og:title" content="DMOKit">
    <meta property="og:description" content="디지몬 마스터즈 온라인 도구 모음 - 탐험 효율 계산기, 가챠 시뮬레이터">
    <meta property="og:image" content="img/dmo.png">
</head>
<body>

    <div class="header-container">
        <div class="header-content">
            <h2>DMOKit</h2>
            <p class="subtitle">디지몬 마스터즈 온라인 도구 모음</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="menu-grid">
            <a href="explore/" class="menu-card">
                <div class="icon">🗺️</div>
                <div class="title">탐험 효율 계산기</div>
                <div class="desc">Lv.1 ~ Lv.170 탐험지별 효율 분석</div>
            </a>
            <a href="gacha/" class="menu-card">
                <div class="icon">🎲</div>
                <div class="title">가챠 시뮬레이터</div>
                <div class="desc">데이터 소환 / 드로우 / 융합 시뮬레이션</div>
            </a>
            <a href="timer/" class="menu-card">
                <div class="icon">⏱️</div>
                <div class="title">버프 타이머</div>
                <div class="desc">버프 시간 관리 · PiP 모드 지원</div>
            </a>
            <a href="option/" class="menu-card">
                <div class="icon">🔧</div>
                <div class="title">옵션 변경 시뮬레이터</div>
                <div class="desc">악세사리 / 장비 옵션 변경 시뮬레이션</div>
            </a>
            <a href="breakthrough/" class="menu-card">
                <div class="icon">💠</div>
                <div class="title">돌파 옵션 시뮬레이터</div>
                <div class="desc">돌파 단계별 옵션 능력치 누적 시뮬레이션</div>
            </a>
            <a href="ranking/" class="menu-card">
                <div class="icon">🏆</div>
                <div class="title">랭킹 던전 교환 계산기</div>
                <div class="desc">무한의 투기장 재료 교환 · 제작까지 필요 시즌 계산</div>
            </a>
            <a href="backup/" class="menu-card">
                <div class="icon">💾</div>
                <div class="title">데이터 백업 / 복원</div>
                <div class="desc">저장 데이터 내보내기 / 가져오기 (기기 이동 · 공유)</div>
            </a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
