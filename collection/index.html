<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMO 유니온 수집 효과 계산기</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <meta property="og:title" content="DMO 유니온 수집 효과 계산기">
    <meta property="og:description" content="완료한 유니온 수집 효과를 체크하면 EXP·속성 보너스를 자동 합산해줍니다.">
    <meta property="og:image" content="../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="메인 메뉴로">← 메인</a>
        <div class="header-content">
            <h2>DMO 유니온 수집 효과 계산기</h2>
            <p class="subtitle">완료한 유니온 수집 효과 체크 → 보너스 합산</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="summary-box" id="summary"></div>

        <div class="collection-toolbar">
            <input type="text" id="search" class="collection-search" placeholder="디지몬 이름 검색">
            <button type="button" id="resetBtn" class="reset-btn">전체 초기화</button>
        </div>

        <div class="collection-grid" id="grid"></div>
    </div>

    <script type="module" src="../js/collection/main.js"></script>
</body>
</html>
