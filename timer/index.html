<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 버프 타이머</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <meta property="og:title" content="DMOKit - 버프 타이머">
    <meta property="og:description" content="디지몬 마스터즈 버프 타이머 - PiP 모드 지원">
    <meta property="og:image" content="../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="메인 메뉴로">← 메인</a>
        <div class="header-content">
            <h2>버프 타이머</h2>
            <p class="subtitle">버프 시간을 설정하고 PiP 모드로 관리</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="buff-picker-top">
            <h3 class="section-title" style="margin:0">버프 선택</h3>
            <div class="buff-picker-actions">
                <button class="calc-btn secondary" id="start-all-btn">전체 시작</button>
                <button class="pip-btn" id="pip-btn">🖼️ PiP 모드</button>
            </div>
        </div>
        <div class="buff-picker-body" id="buff-picker-body"></div>
    </div>

    <div id="timer-list"></div>

    <script type="module" src="../js/timer/main.js"></script>
</body>
</html>
