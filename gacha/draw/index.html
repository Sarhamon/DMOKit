<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 데이터 드로우 시뮬레이터</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../../css/style.css">
    <meta property="og:title" content="DMOKit - 데이터 드로우 시뮬레이터">
    <meta property="og:description" content="디지몬 마스터즈 데이터 드로우 확률 기반 시뮬레이션">
    <meta property="og:image" content="../../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="가챠 메뉴로">← 가챠</a>
        <div class="header-content">
            <h2>데이터 드로우 시뮬레이터</h2>
            <p class="subtitle">공식 확률 기반 뽑기 체험</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="inv-bar">
        <span id="invCount">인벤토리: 0개</span>
        <a href="../fusion/" class="inv-link">융합으로 →</a>
    </div>

    <div class="card">
        <div class="draw-selector">
            <label>드로우 선택</label>
            <div class="buff-group-buttons" id="drawPicker"></div>
        </div>
        <div class="draw-active" id="drawActiveSection" hidden>
            <div class="draw-meta" id="drawMeta">—</div>
            <div class="draw-controls">
                <button class="calc-btn" id="pull1Btn">1회 뽑기</button>
                <button class="calc-btn secondary" id="resetBtn">초기화</button>
                <label class="auto-reveal-label">
                    <input type="checkbox" id="autoRevealCheck"> 자동 공개
                </label>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">누적 통계</h3>
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">획득 아이템</span>
                <span class="stat-value" id="statTotal">0개</span>
            </div>
            <div class="stat-grade-list" id="statGradeList"></div>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">이번 결과 <span class="result-count" id="resultCount"></span></h3>
        <div class="result-grid" id="resultGrid">
            <div class="empty-msg">뽑기 버튼을 눌러주세요.</div>
        </div>
    </div>

    <script type="module" src="../../js/gacha/draw.js"></script>
</body>
</html>
