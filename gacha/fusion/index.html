<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 데이터 융합 시뮬레이터</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../../css/style.css">
    <meta property="og:title" content="DMOKit - 데이터 융합 시뮬레이터">
    <meta property="og:description" content="디지몬 마스터즈 데이터 융합 - 천장 시스템 포함">
    <meta property="og:image" content="../../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="가챠 메뉴로">← 가챠</a>
        <div class="header-content">
            <h2>데이터 융합 시뮬레이터</h2>
            <p class="subtitle">동일 등급 4개 → 결과 1개 (천장 시스템 포함)</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="inv-bar">
        <span id="invCount">인벤토리: 0개</span>
        <a href="../draw/" class="inv-link">← 드로우로</a>
    </div>

    <div class="card">
        <div class="fusion-controls">
            <div class="buff-group-buttons">
                <label class="buff-toggle">
                    <input type="radio" name="fusion-mode" value="auto" class="buff-check" checked>
                    <span class="buff-toggle-name">자동</span>
                </label>
                <label class="buff-toggle">
                    <input type="radio" name="fusion-mode" value="SSS" class="buff-check">
                    <span class="buff-toggle-name">SSS</span>
                </label>
                <label class="buff-toggle">
                    <input type="radio" name="fusion-mode" value="SSS+" class="buff-check">
                    <span class="buff-toggle-name">SSS+</span>
                </label>
            </div>

            <div class="fusion-avail" id="fusionAvail"></div>

            <div class="mode-pane">
                <button class="calc-btn" id="fuse10Btn">10회 합성</button>
            </div>

            <div class="pity-display" id="pityDisplay"></div>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">최근 결과 <span class="result-count" id="fusionResultCount"></span></h3>
        <div class="result-grid" id="fusionResultGrid">
            <div class="empty-msg">합성 버튼을 눌러주세요.</div>
        </div>
    </div>

    <div class="card">
        <div class="inv-header">
            <h3 class="section-title">인벤토리</h3>
            <button class="calc-btn secondary" id="clearInvBtn">인벤토리 비우기</button>
        </div>

        <div class="inv-section">
            <h4 class="inv-section-title">진화 아이템 <span class="inv-section-count" id="invEvolutionCount"></span></h4>
            <div class="inv-summary" id="invEvolutionSummary">—</div>
            <div class="inv-grid" id="invEvolutionGrid">
                <div class="empty-msg">드로우/융합 결과가 이곳에 쌓입니다.</div>
            </div>
        </div>

        <div class="inv-section">
            <h4 class="inv-section-title">기타 아이템 <span class="inv-section-count" id="invOtherCount"></span></h4>
            <div class="inv-summary" id="invOtherSummary">—</div>
            <div class="inv-grid" id="invOtherGrid">
                <div class="empty-msg">데이터 소환 결과가 이곳에 쌓입니다.</div>
            </div>
        </div>
    </div>

    <script type="module" src="../../js/gacha/fusion.js"></script>
</body>
</html>
