<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 가챠 확률 보기</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../../css/style.css">
    <meta property="og:title" content="DMOKit - 가챠 확률 보기">
    <meta property="og:description" content="드로우/소환/융합 아이템 목록과 확률 정보">
    <meta property="og:image" content="../../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="가챠 메뉴로">← 가챠</a>
        <div class="header-content">
            <h2>가챠 확률 보기</h2>
            <p class="subtitle">각 풀의 아이템 목록과 확률을 확인하세요</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="rate-tabs" id="rateTabs">
            <button class="mode-btn active" data-cat="draw">데이터 드로우</button>
            <button class="mode-btn" data-cat="summon">데이터 소환</button>
            <button class="mode-btn" data-cat="fusion">데이터 융합</button>
        </div>

        <div class="draw-selector">
            <label for="poolSelect">풀 선택</label>
            <select id="poolSelect"></select>
            <div class="draw-meta" id="poolMeta">—</div>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">아이템 목록 <span class="result-count" id="rateCount"></span></h3>
        <div class="rate-list" id="rateList">
            <div class="empty-msg">풀을 선택해주세요.</div>
        </div>
    </div>

    <script type="module" src="../../js/gacha/rates.js"></script>
</body>
</html>
