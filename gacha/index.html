<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMOKit - 가챠 시뮬레이터</title>
    <script>
        if (localStorage.getItem('dmo_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <meta property="og:title" content="DMOKit - 가챠 시뮬레이터">
    <meta property="og:description" content="디지몬 마스터즈 데이터 소환 / 드로우 / 융합 시뮬레이터">
    <meta property="og:image" content="../img/dmo.png">
</head>
<body>

    <div class="header-container">
        <a href="../" class="home-link" aria-label="메인 메뉴로">← 메인</a>
        <div class="header-content">
            <h2>가챠 시뮬레이터</h2>
            <p class="subtitle">데이터 소환 / 드로우 / 융합</p>
        </div>
        <button class="theme-toggle" aria-label="다크모드로 전환" aria-pressed="false">🌙</button>
    </div>

    <div class="card">
        <div class="menu-grid">
            <a href="draw/" class="menu-card">
                <div class="icon">🃏</div>
                <div class="title">데이터 드로우</div>
                <div class="desc">티켓을 사용하여 보상 드로우</div>
            </a>
            <a href="fusion/" class="menu-card">
                <div class="icon">⚗️</div>
                <div class="title">데이터 융합</div>
                <div class="desc">보유 아이템을 융합하여 상위 보상 획득</div>
            </a>
            <a href="summon/" class="menu-card">
                <div class="icon">🔮</div>
                <div class="title">데이터 소환</div>
                <div class="desc">캡슐을 사용하여 디지몬/아이템 소환</div>
            </a>
            <a href="rates/" class="menu-card">
                <div class="icon">📊</div>
                <div class="title">확률 보기</div>
                <div class="desc">드로우/소환/융합 아이템 목록과 확률</div>
            </a>
        </div>
    </div>

    <script type="module" src="../js/gacha/main.js"></script>
</body>
</html>
